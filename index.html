<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台電出入証產生器</title>
    <!-- 載入 React 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 PDF 工具庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', "Microsoft JhengHei", sans-serif;
        }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 圖示組件 (Inline SVG 確保相容性) ---
        const Icon = ({ d, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={d} />
            </svg>
        );

        const FileTextIcon = (props) => <Icon d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z M14 2v6h6" {...props} />;
        const LayoutGridIcon = (props) => <Icon d="M3 3h7v7H3z M14 3h7v7h-7z M14 14h7v7h-7z M3 14h7v7H3z" {...props} />;
        const SquareIcon = (props) => <Icon d="M3 3h18v18H3z" {...props} />;
        const UploadIcon = (props) => <Icon d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12" {...props} />;
        const UserIcon = (props) => <Icon d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" {...props} />;
        const RefreshCwIcon = (props) => <Icon d="M21 2v6h-6 M3 12a9 9 0 0 1 15-6.7L21 8 M3 22v-6h6 M21 12a9 9 0 0 1-15 6.7L3 16" {...props} />;
        const FileDownIcon = (props) => <Icon d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 3v12" {...props} />;
        const CheckCircleIcon = (props) => <Icon d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3" {...props} />;
        const AlertCircleIcon = (props) => <Icon d="M12 8v4 M12 16h.01 M22 12A10 10 0 1 1 2 12a10 10 0 0 1 20 0z" {...props} />;

        // --- 台電 LOGO 組件 ---
        const TaipowerLogo = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="47" fill="none" stroke="#0067B0" strokeWidth="2.8" />
                <circle cx="50" cy="50" r="41.5" fill="none" stroke="#0067B0" strokeWidth="2.8" />
                <circle cx="50" cy="50" r="36" fill="none" stroke="#0067B0" strokeWidth="2.8" />
                <g fill="#E60012">
                    <path d="M42 34 L32 16 L22 34 L32 34 Z" transform="rotate(-6, 42, 34)" />
                    <path d="M58 34 L68 16 L78 34 L68 34 Z" transform="rotate(6, 58, 34)" />
                    <path d="M42 66 L32 84 L22 66 L32 66 Z" transform="rotate(6, 42, 66)" />
                    <path d="M58 66 L68 84 L78 66 L68 66 Z" transform="rotate(-6, 58, 66)" />
                </g>
                <g fill="none" stroke="#0067B0" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M50 24 L42 38 L58 38 Z" strokeWidth="2.5" />
                    <rect x="42.5" y="41" width="15" height="7.5" />
                    <path d="M38 52 H62 M38 60 H62 M38 68 H62 M50 52 V78" />
                    <path d="M50 78 L53 84" strokeWidth="4" />
                </g>
            </svg>
        );

        // --- 虛擬 QR Code ---
        const QRCodeImg = ({ text }) => (
            <div className="w-12 h-12 border-[1px] border-black p-0.5 bg-white flex flex-wrap flex-shrink-0">
                {[...Array(49)].map((_, i) => {
                    const isBlack = (text.length + i) % 3 === 0 || (i % 7 === 0) || (i < 5) || (i > 43);
                    return <div key={i} className={`w-[14.28%] h-[14.28%] ${isBlack ? 'bg-black' : 'bg-white'}`}></div>;
                })}
            </div>
        );

        // --- 主要應用程式 ---
        const App = () => {
            const createEmptyCard = () => ({
                id: '', 
                name: '',
                bloodType: 'O',
                photo: null,
                contractor: '', 
                project: '通霄電廠第二期更新改建計畫新161kV開關場統包工程',
                expiryDate: '2026-12-31',
                uuid: crypto.randomUUID()
            });

            const [mode, setMode] = useState('batch'); 
            const [cards, setCards] = useState(Array.from({ length: 8 }, () => createEmptyCard()));
            const [singleCard, setSingleCard] = useState(createEmptyCard());
            const [isProcessing, setIsProcessing] = useState(false);

            const formatDate = (dateStr) => {
                if (!dateStr) return "";
                const date = new Date(dateStr);
                const minguoYear = date.getFullYear() - 1911;
                return `至${minguoYear}年${date.getMonth() + 1}月${date.getDate()}日`;
            };

            const updateCardData = (index, field, value) => {
                if (mode === 'batch') {
                    const newCards = [...cards];
                    newCards[index][field] = value;
                    setCards(newCards);
                } else {
                    setSingleCard(prev => ({ ...prev, [field]: value }));
                }
            };

            const handlePhotoUpload = (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => updateCardData(index, 'photo', reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const generatePDF = async () => {
                const validCards = (mode === 'batch' ? cards : [singleCard]).filter(c => c.name.trim() !== "" || c.photo !== null);
                if (validCards.length === 0) {
                    alert("請填寫姓名或上傳照片再進行匯出");
                    return;
                }

                setIsProcessing(true);
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                
                const cardW = 90;
                const cardH = 55;
                const marginX = 10;
                const marginY = 15;
                const gapX = 10;
                const gapY = 10;

                for (let i = 0; i < validCards.length; i++) {
                    const card = validCards[i];
                    const element = document.getElementById(`print-ref-${card.uuid}`);
                    if (!element) continue;

                    const canvas = await html2canvas(element, { scale: 4, useCORS: true, logging: false, backgroundColor: '#ffffff' });
                    const imgData = canvas.toDataURL('image/png');
                    const pageIdx = i % 8;
                    const col = pageIdx % 2;
                    const row = Math.floor(pageIdx / 2);
                    
                    if (i > 0 && pageIdx === 0) doc.addPage();
                    const x = marginX + (col * (cardW + gapX));
                    const y = marginY + (row * (cardH + gapY));
                    doc.addImage(imgData, 'PNG', x, y, cardW, cardH);
                }

                doc.save(`台電出入証產生器_批次匯出_${new Date().getTime()}.pdf`);
                setIsProcessing(false);
            };

            const IDCard = ({ data, domId }) => (
                <div id={domId} className="w-[340px] h-[208px] border-[1.5px] border-black bg-white flex flex-col box-border relative overflow-hidden shrink-0">
                    <div className="flex justify-between items-center px-2 py-1.5 border-b-[1.5px] border-black">
                        <div className="flex items-center gap-1.5">
                            <div className="w-11 h-11 flex items-center justify-center p-0.5"><TaipowerLogo /></div>
                            <div className="flex flex-col">
                                <div className="text-[14px] font-bold tracking-tighter leading-none text-black">台灣電力公司綜合施工處工作證</div>
                                <div className="text-[13.5px] font-bold mt-1 leading-none tracking-[0.55em] text-black">承 商 人 員 工 作 證</div>
                            </div>
                        </div>
                        <QRCodeImg text={data.id || 'TP'} />
                    </div>
                    <div className="text-center text-[10.5px] font-bold border-b-[1.5px] border-black py-0.5 px-2 truncate text-black">{data.project}</div>
                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-[105px] border-r-[1.5px] border-black flex-shrink-0 flex items-center justify-center p-1.5 bg-white">
                            <div className="w-full h-full border border-gray-300 overflow-hidden flex items-center justify-center">
                                {data.photo ? <img src={data.photo} className="w-full h-full object-contain" /> : <UserIcon size={55} className="text-gray-100" />}
                            </div>
                        </div>
                        <div className="flex-1 flex flex-col text-[12px] font-bold text-black">
                            {[
                                { label: "編 號", value: data.id },
                                { label: "承 商", value: data.contractor },
                                { label: "姓 名", value: data.name },
                                { label: "血 型", value: data.bloodType },
                                { label: "期 限", value: formatDate(data.expiryDate) }
                            ].map((row, i) => (
                                <div key={i} className={`flex flex-1 items-center ${i !== 4 ? 'border-b-[1.5px] border-black' : ''}`}>
                                    <div className="w-[48px] h-full flex items-center justify-center border-r-[1.5px] border-black bg-slate-50 text-[10.5px] flex-shrink-0 text-center px-1">{row.label}</div>
                                    <div className="flex-1 text-center px-2 py-0.5 leading-tight truncate">{row.value}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const activeCards = mode === 'batch' ? cards : [singleCard];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto mb-8 no-print">
                        <div className="bg-white rounded-3xl shadow-xl p-8 border border-slate-200">
                            <div className="flex flex-col lg:flex-row justify-between items-center gap-8">
                                <div>
                                    <h1 className="text-3xl font-black text-slate-800 flex items-center gap-4">
                                        <FileTextIcon className="text-blue-600" size={32} /> 台電出入証產生器
                                    </h1>
                                    <p className="text-slate-500 mt-2 font-medium">9x5.5cm 標準規格 | 民國年換算 | GitHub 部署版</p>
                                </div>
                                <div className="flex flex-wrap items-center gap-4">
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                                        <button onClick={() => setMode('single')} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'single' ? 'bg-white shadow-lg text-blue-600' : 'text-slate-500'}`}><SquareIcon size={16} /> 單張</button>
                                        <button onClick={() => setMode('batch')} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'batch' ? 'bg-white shadow-lg text-blue-600' : 'text-slate-500'}`}><LayoutGridIcon size={16} /> 批次</button>
                                    </div>
                                    <button onClick={generatePDF} disabled={isProcessing} className="flex items-center gap-3 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white px-8 py-4 rounded-2xl font-black shadow-xl transition-all hover:scale-105 active:scale-95">
                                        {isProcessing ? <RefreshCwIcon className="animate-spin" size={24} /> : <FileDownIcon size={24} />} 產生批次 PDF 檔
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 no-print">
                        <div className={`grid gap-5 ${mode === 'batch' ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1'}`}>
                            {activeCards.map((card, idx) => (
                                <div key={card.uuid} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all">
                                    <div className="flex items-center justify-between mb-5 pb-3 border-b border-slate-100">
                                        <h3 className="font-black text-slate-700 flex items-center gap-2"><CheckCircleIcon size={20} className={card.name ? "text-green-500" : "text-slate-300"} /> 編輯証件 #{idx + 1}</h3>
                                        {!card.name && <span className="text-[10px] bg-orange-50 text-orange-600 px-2 py-1 rounded-full font-bold flex items-center gap-1"><AlertCircleIcon size={10} /> 未輸入姓名</span>}
                                    </div>
                                    <div className="space-y-5">
                                        <div className="flex gap-4">
                                            <div onClick={() => document.getElementById(`upload-${idx}`).click()} className="w-24 h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden hover:border-blue-300 transition-all shrink-0">
                                                {card.photo ? <img src={card.photo} className="w-full h-full object-contain" /> : <><UploadIcon size={28} className="text-slate-300 mb-2" /><span className="text-[10px] text-slate-400 font-black">照片</span></>}
                                                <input id={`upload-${idx}`} type="file" className="hidden" accept="image/*" onChange={(e) => handlePhotoUpload(mode === 'batch' ? idx : 0, e)} />
                                            </div>
                                            <div className="flex-1 space-y-3">
                                                <input type="text" placeholder="姓名" value={card.name} onChange={(e) => updateCardData(idx, 'name', e.target.value)} className="w-full p-2.5 border rounded-xl font-bold outline-none" />
                                                <input type="text" placeholder="証件編號" value={card.id} onChange={(e) => updateCardData(idx, 'id', e.target.value)} className="w-full p-2.5 border rounded-xl font-bold outline-none" />
                                                <select value={card.bloodType} onChange={(e) => updateCardData(idx, 'bloodType', e.target.value)} className="w-full p-2.5 border rounded-xl font-bold bg-white outline-none cursor-pointer">
                                                    <option value="O">O 型</option><option value="A">A 型</option><option value="B">B 型</option><option value="AB">AB 型</option><option value="RH">RH 型</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="pt-2 space-y-3 border-t border-slate-50">
                                            <input type="text" placeholder="承商名稱" value={card.contractor} onChange={(e) => updateCardData(idx, 'contractor', e.target.value)} className="w-full p-2.5 border rounded-xl text-sm font-bold" />
                                            <input type="text" placeholder="工程項目" value={card.project} onChange={(e) => updateCardData(idx, 'project', e.target.value)} className="w-full p-2.5 border rounded-xl text-sm font-bold" />
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs text-slate-500 font-black shrink-0">有效期限:</span>
                                                <input type="date" value={card.expiryDate} onChange={(e) => updateCardData(idx, 'expiryDate', e.target.value)} className="flex-1 p-2.5 border rounded-xl text-sm font-bold cursor-pointer" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="sticky top-8 space-y-6">
                            <div className="bg-slate-900 p-5 rounded-t-3xl text-white font-black flex items-center justify-between shadow-2xl">
                                <span className="flex items-center gap-2"><LayoutGridIcon size={18} /> 即時預覽區域</span>
                                <span className="text-[11px] text-blue-400 bg-blue-400/10 px-3 py-1 rounded-full">90x55mm</span>
                            </div>
                            <div className="bg-slate-200 p-8 rounded-b-3xl shadow-inner flex flex-col items-center gap-10 overflow-auto max-h-[75vh] border-x border-b border-slate-300">
                                {activeCards.map((card, idx) => (
                                    <div key={`preview-${card.uuid}`} className={`bg-white p-3 shadow-2xl transition-all ${!card.name && !card.photo ? 'opacity-30 grayscale blur-[0.5px]' : 'opacity-100'}`}>
                                        <IDCard data={card} domId={`print-ref-${card.uuid}`} />
                                        <div className="text-center mt-3 text-[10px] font-black text-slate-500 border-t pt-2 border-slate-100">PREVIEW CARD #{idx + 1}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isProcessing && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex flex-col items-center justify-center z-50 no-print">
                            <div className="bg-white p-12 rounded-[2.5rem] flex flex-col items-center gap-8 shadow-2xl">
                                <RefreshCwIcon className="animate-spin text-blue-600" size={64} />
                                <p className="font-black text-2xl text-slate-800">正在處理 PDF 檔案...</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
